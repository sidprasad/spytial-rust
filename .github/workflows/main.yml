name: Main Branch

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    name: Build Docker image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ghcr.io/sidprasad/spytial-rust:${{ github.sha }}-${{ matrix.arch }}
            ghcr.io/sidprasad/spytial-rust:latest-${{ matrix.arch }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  docker-manifest:
    name: Create multi-arch manifests
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push SHA manifest
        run: |
          docker manifest create ghcr.io/sidprasad/spytial-rust:${{ github.sha }} \
            ghcr.io/sidprasad/spytial-rust:${{ github.sha }}-amd64 \
            ghcr.io/sidprasad/spytial-rust:${{ github.sha }}-arm64
          docker manifest push ghcr.io/sidprasad/spytial-rust:${{ github.sha }}

      - name: Create and push latest manifest
        run: |
          docker manifest create ghcr.io/sidprasad/spytial-rust:latest \
            ghcr.io/sidprasad/spytial-rust:latest-amd64 \
            ghcr.io/sidprasad/spytial-rust:latest-arm64
          docker manifest push ghcr.io/sidprasad/spytial-rust:latest
